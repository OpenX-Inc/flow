# Flow Configuration
# Copy this file to config/config.toml and fill in your values.

[llm]
# Supported: openai, deepseek, ollama (any OpenAI-compatible API works)
provider = "openai"
api_key = ""
base_url = ""  # Leave empty for default OpenAI endpoint
model = "gpt-4o-mini"

# DeepSeek example:
#   provider = "deepseek"
#   api_key = "sk-..."
#   base_url = "https://api.deepseek.com"
#   model = "deepseek-chat"

# Ollama (local, free, no API key):
#   provider = "ollama"
#   api_key = ""
#   base_url = "http://localhost:11434/v1"
#   model = "llama3"

[gpu_backend]
# Supported: modal, runpod, self-hosted
provider = "modal"
url = ""  # URL of your GPU backend inference server
api_key = ""
resolution = "480p"  # 480p or 720p
clip_duration = 5  # seconds per clip

[tts]
# Supported: edge (free), miso (natural, needs GPU), elevenlabs
provider = "edge"
voice = "en-US-ChristopherNeural"
api_key = ""  # Only needed for elevenlabs

# MisoTTS settings (only when provider = "miso")
miso_model = "MisoLabs/MisoTTS"
miso_precision = "int8"  # bf16, int8, int4 (int8 = 16GB VRAM)
voice_sample = ""  # Path to reference audio for voice cloning (e.g., "config/voices/narrator.wav")
voice_transcript = ""  # Transcript of the voice sample

[publish]
enabled = false
platforms = ["tiktok", "youtube", "instagram"]
tiktok_access_token = ""
youtube_client_id = ""
youtube_client_secret = ""

[scheduler]
enabled = false
cron = "0 2 * * *"  # Daily at 2am UTC
topics_file = ""  # Path to file with one topic per line (optional)
auto_generate_topics = true

# General settings
output_dir = "storage/outputs"
aspect_ratio = "9:16"  # 9:16 for shorts, 16:9 for long-form
generation_mode = "sequential"  # sequential or parallel_flf2v
